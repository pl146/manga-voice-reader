<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MangaVoice</title>
  <style>
    :root {
      --bg: #05070a; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
      --accent: #7dd3fc; --accent2: #818cf8; --green: #4ade80; --yellow: #fbbf24;
      --red: #f87171; --text: #e2e8f0; --dim: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: transparent;
      color: var(--text);
      font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
    }
    .title {
      font-size: 17px; font-weight: 700; color: #fff;
      letter-spacing: -0.3px;
    }
    .title span { color: var(--accent); }

    /* Status */
    .status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--dim);
      transition: all 0.3s;
    }
    .dot.online { background: var(--green); box-shadow: 0 0 8px rgba(74,222,128,0.5); }
    .dot.offline { background: var(--red); }
    .dot.loading { background: var(--yellow); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    .status-text { font-size: 12px; color: var(--dim); flex: 1; }
    .status-text.connected { color: var(--text); }
    #server-detail { font-size: 10px; color: var(--dim); margin-top: 2px; }

    /* Model pills - compact */
    .pills { display: none; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .pill {
      font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 4px;
      background: rgba(255,255,255,0.04); color: var(--dim);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .pill.on { background: rgba(74,222,128,0.08); color: var(--green); border-color: rgba(74,222,128,0.15); }

    /* Main Button */
    .btn-open {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #0f172a; border: none;
      padding: 14px; border-radius: 14px;
      cursor: pointer; font-size: 14px; font-weight: 700;
      width: 100%; transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(125,211,252,0.2);
      letter-spacing: -0.2px;
    }
    .btn-open:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(125,211,252,0.3);
    }
    .btn-open:active { transform: scale(0.98); }

    #status {
      font-size: 11px; color: var(--red); text-align: center; min-height: 0;
    }

    /* Footer */
    .footer {
      font-size: 9px; color: rgba(100,116,139,0.5);
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Starfield */
    html { background: var(--bg); }
    canvas#stars {
      position: fixed; top: 0; left: 0; width: 320px; height: 100%;
      z-index: 0; pointer-events: none;
      background: var(--bg);
    }
    .container { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="container">
    <div class="header">
      <img class="logo" src="icons/icon128.png" alt="">
      <div class="title">Manga<span>Voice</span></div>
    </div>

    <div class="status-row">
      <div class="dot" id="server-dot"></div>
      <div>
        <div class="status-text" id="server-label">Checking...</div>
        <div id="server-detail"></div>
      </div>
    </div>

    <div class="pills" id="model-pills">
      <div class="pill" id="pill-florence">Florence-2</div>
      <div class="pill" id="pill-paddle">OCR</div>
      <div class="pill" id="pill-bubble">Detection</div>
      <div class="pill" id="pill-tts">TTS</div>
    </div>

    <button class="btn-open" id="btn-open">Open Reader</button>
    <div id="status"></div>

    <div class="footer">100% local &middot; no cloud</div>
  </div>

  <script src="stars.js"></script>
  <script src="popup.js"></script>
</body>
</html>
